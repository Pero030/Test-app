<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="HandheldFriendly"
        content="true"
    >

    <meta
        name="MobileOptimized"
        content="width"
    >

    <meta
        name="format-detection"
        content="telephone=no"
    >

    <title>
        Einstellungen - ALO Academy
    </title>

    <link
        rel="stylesheet"
        href="assets/css/style.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <div
        data-component="header"
        data-variant="home"
        data-component-base="."
    ></div>

    <main class="settings-page">

        <section class="settings-wrapper">

            <div class="settings-hero">

                <h1>
                    Einstellungen
                </h1>

                <p>
                    Verwaltung von Mitteilungen und Wartungsmodus.
                </p>

            </div>

            <div
                id="settingsContent"
                style="display:block;"
            >

                <div class="settings-layout">

                    <aside
                        class="settings-sidebar"
                        style="
                            background:red;
                            min-width:320px;
                            padding:30px;
                        "
                    >

                        <h2 style="color:white;">
                            TEST SIDEBAR
                        </h2>

                        <button>
                            Mitteilungen
                        </button>

                        <button>
                            Wartung
                        </button>

                    </aside>

                    <div
                        class="settings-content"
                        style="
                            background:blue;
                            min-height:500px;
                            width:100%;
                        "
                    >

                        TEST CONTENT

                    </div>

                </div>

            </div>

        </section>

    </main>

    <div
        data-component="footer"
        data-variant="home"
        data-component-base="."
    ></div>

    <script type="module" src="components/components.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/game.js"></script>

</body>

</html>
