<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="width">
  <meta name="format-detection" content="telephone=no">
  <title>Einstellungen - ALO Academy</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div data-component="header" data-variant="home" data-component-base="."></div>

  <main style="min-height: calc(100vh - 250px); padding: 70px 30px;">
    <section class="section" style="max-width: 1100px; margin: 0 auto; display: block;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;">Einstellungen</h1>
        <p style="font-size: 20px; color: rgba(255,255,255,0.82);">Infos erstellen, die über die Glocke auf allen Seiten angezeigt werden.</p>
      </div>

      <div id="settingsLocked" style="display: none; text-align: center; padding: 40px;">
        <h2>Zugriff geschützt</h2>
        <p>Bitte gib den PIN ein, um die Einstellungen zu öffnen.</p>
        <input id="settingsPinInput" type="password" placeholder="PIN" style="max-width: 320px; text-align: center;">
        <div style="margin-top: 24px;">
          <button class="primary-btn" onclick="unlockSettingsPage()">Entsperren</button>
          <button class="secondary-btn" onclick="location.href='./'" style="margin-left: 12px;">Zur Startseite</button>
        </div>
        <p id="settingsPinError" style="display: none; color: #fca5a5; margin-top: 20px;">Falscher PIN.</p>
      </div>

      <div id="settingsContent" style="display: none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start;">
          <div class="glass-card blue-theme" style="padding: 35px;">
            <h2>Neue Info</h2>
            <label for="infoTitle" style="display: block; color: #38bdf8; font-weight: 800; margin-bottom: 6px;">Titel</label>
            <input id="infoTitle" type="text" placeholder="z.B. Wartung am Freitag">
            <label for="infoText" style="display: block; color: #38bdf8; font-weight: 800; margin: 22px 0 6px;">Text</label>
            <textarea id="infoText" rows="7" placeholder="Schreibe hier die Information..."></textarea>
            <button class="primary-btn" onclick="saveInfo()" style="margin-top: 24px; width: 100%;">Info speichern</button>
            <p id="saveFeedback" style="display: none; color: #86efac; margin-top: 18px;">Info gespeichert.</p>
          </div>

          <div class="glass-card purple-theme" style="padding: 35px;">
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 18px;">
              <h2 style="margin: 0;">Aktuelle Infos</h2>
              <button onclick="clearInfos()" style="background: #ef4444; color: white; padding: 10px 16px; border-radius: 12px; font-size: 14px;">Alle löschen</button>
            </div>
            <div id="infoList"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-component="footer" data-variant="home" data-component-base="."></div>

  <script type="module">

    import {
      db,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      orderBy,
      query
    } from "./assets/js/firebase.js";

  
  
    const infoStorageKey = "aloAcademyInfos";
    const settingsPin = "080918";

    async function getInfos() {

      const q = query(collection(db, "infos"));

      const snapshot = await getDocs(q);

      const infos = [];

      snapshot.forEach((docItem) => {
        infos.push({
          firebaseId: docItem.id,
          ...docItem.data()
        });
      });

      return infos.reverse();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function renderInfos() {
      const list = document.getElementById("infoList");
      const infos = await getInfos();

      if (!infos.length) {
        list.innerHTML = '<p style="color: rgba(255,255,255,0.72);">Noch keine Infos vorhanden.</p>';
        return;
      }

      list.innerHTML = infos.map(function (info, index) {
        return '<div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; padding: 20px; margin-bottom: 14px;">' +
          '<h3 style="font-size: 22px; margin-bottom: 8px;">' + escapeHtml(info.title) + '</h3>' +
          '<p style="font-size: 16px; color: rgba(255,255,255,0.82); white-space: pre-wrap;">' + escapeHtml(info.text) + '</p>' +
          '<p style="font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 14px;">' + escapeHtml(info.date || "") + '</p>' +
          '<button onclick="deleteInfo(\'' + info.firebaseId + '\')" style="background: #ef4444; color: white; padding: 9px 14px; border-radius: 10px; font-size: 13px;">Löschen</button>' +
        '</div>';
      }).join("");
    }

    async function saveInfo() {

      const title = document.getElementById("infoTitle").value.trim();
      const text = document.getElementById("infoText").value.trim();
      const feedback = document.getElementById("saveFeedback");

      if (!title || !text) {
        alert("Bitte Titel und Text ausfüllen.");
        return;
      }

      await addDoc(collection(db, "infos"), {
        title: title,
        text: text,
        date: new Date().toLocaleDateString("de-DE", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric"
        }),
        createdAt: Date.now()
      });

      document.getElementById("infoTitle").value = "";
      document.getElementById("infoText").value = "";

      feedback.style.display = "block";

      setTimeout(function () {
        feedback.style.display = "none";
      }, 1800);

      await renderInfos();

      if (typeof updateInfoBadge === "function") {
        updateInfoBadge();
      }
    }

    async function deleteInfo(firebaseId) {

      await deleteDoc(doc(db, "infos", firebaseId));

      await renderInfos();

      if (typeof updateInfoBadge === "function") {
        updateInfoBadge();
      }
    }

    function clearInfos() {
      if (!confirm("Alle Infos löschen?")) return;
      setInfos([]);
      renderInfos();
    }

    function unlockSettingsPage() {
      const input = document.getElementById("settingsPinInput");
      const error = document.getElementById("settingsPinError");

      if (input.value === settingsPin) {
        sessionStorage.setItem("aloAcademySettingsUnlocked", "true");
        showSettingsContent();
      } else {
        error.style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    function showSettingsContent() {
      document.getElementById("settingsLocked").style.display = "none";
      document.getElementById("settingsContent").style.display = "block";
      renderInfos();
    }

    document.addEventListener("DOMContentLoaded", function () {
      if (sessionStorage.getItem("aloAcademySettingsUnlocked") === "true") {
        showSettingsContent();
      } else {
        document.getElementById("settingsLocked").style.display = "block";
      }

      const input = document.getElementById("settingsPinInput");
      if (input) {
        input.addEventListener("keydown", function (event) {
          if (event.key === "Enter") unlockSettingsPage();
        });
      }
    });
  </script>
</body>
</html>
