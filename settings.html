<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="HandheldFriendly"
        content="true"
    >

    <meta
        name="MobileOptimized"
        content="width"
    >

    <meta
        name="format-detection"
        content="telephone=no"
    >

    <title>
        Einstellungen - ALO Academy
    </title>

    <link
        rel="stylesheet"
        href="assets/css/style.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <div
        data-component="header"
        data-variant="home"
        data-component-base="."
    ></div>

    <main
      style="
          min-height:calc(100vh - 250px);
          padding:70px 30px;
      "
    >

        <section
            style="
                max-width:1600px;
                margin:0 auto;
            "
        >

            <!-- HERO -->

            <div
                style="
                    text-align:center;
                    margin-bottom:50px;
                "
            >

                <h1
                    style="
                        font-size:56px;
                        font-weight:900;
                        background:linear-gradient(
                            135deg,
                            #38bdf8,
                            #a855f7
                        );
                        -webkit-background-clip:text;
                        -webkit-text-fill-color:transparent;
                    "
                >
                    Einstellungen
                </h1>

                <p
                    style="
                        font-size:20px;
                        color:rgba(255,255,255,0.82);
                    "
                >
                    Verwaltung von Mitteilungen und Wartungsmodus.
                </p>

            </div>

            <!-- LOCK -->

            <div
                id="settingsLocked"
                style="
                    display:none;
                    text-align:center;
                    padding:50px;
                "
            >

                <h2>
                    Zugriff geschützt
                </h2>

                <p>
                    Bitte gib den PIN ein.
                </p>

                <input
                    id="settingsPinInput"
                    type="password"
                    placeholder="PIN"
                    style="
                        max-width:320px;
                        width:100%;
                        text-align:center;
                        margin-top:20px;
                    "
                >

                <div
                    style="
                        margin-top:24px;
                        display:flex;
                        justify-content:center;
                        gap:16px;
                    "
                >

                    <button
                        class="primary-btn"
                        onclick="unlockSettingsPage()"
                    >
                        Entsperren
                    </button>

                    <button
                        class="secondary-btn"
                        onclick="location.href='./'"
                    >
                        Zur Startseite
                    </button>

                </div>

                <p
                    id="settingsPinError"
                    style="
                        display:none;
                        color:#fca5a5;
                        margin-top:20px;
                    "
                >
                    Falscher PIN.
                </p>

            </div>

            <!-- CONTENT -->

            <div
                id="settingsContent"
                style="display:none;"
            >

                <div
                    style="
                        display:flex;
                        gap:40px;
                        align-items:flex-start;
                        width:100%;
                    "
                >

                    <!-- SIDEBAR -->

                    <aside
                        style="
                            width:320px;
                            min-width:320px;
                            display:flex;
                            flex-direction:column;
                            gap:18px;
                        "
                    >

                        <h2
                            style="
                                color:#38bdf8;
                                font-size:28px;
                                margin-bottom:10px;
                            "
                        >
                            Einstellungen
                        </h2>

                        <button
                            id="menuMitteilungen"
                            onclick="showSettingsSection('mitteilungen')"
                            style="
                                width:100%;
                                padding:18px 22px;
                                border-radius:18px;
                                border:2px solid rgba(56,189,248,0.3);
                                background:rgba(56,189,248,0.12);
                                cursor:pointer;
                                font-size:18px;
                                font-weight:800;
                                color:white;
                                text-align:left;
                            "
                        >
                            📢 Mitteilungen
                        </button>

                        <button
                            id="menuWartung"
                            onclick="showSettingsSection('wartung')"
                            style="
                                width:100%;
                                padding:18px 22px;
                                border-radius:18px;
                                border:2px solid rgba(168,85,247,0.3);
                                background:rgba(168,85,247,0.12);
                                cursor:pointer;
                                font-size:18px;
                                font-weight:800;
                                color:white;
                                text-align:left;
                            "
                        >
                            🛠️ Wartung
                        </button>

                    </aside>

                    <!-- CONTENT -->

                    <div
                        style="
                            flex:1;
                            min-width:0;
                        "
                    >

                        <!-- MITTEILUNGEN -->

                        <section
                            id="sectionMitteilungen"
                        >

                            <div
                                style="
                                    display:grid;
                                    grid-template-columns:1fr 1fr;
                                    gap:30px;
                                "
                            >

                                <!-- INFO ERSTELLEN -->

                                <div
                                    class="glass-card blue-theme"
                                    style="padding:35px;"
                                >

                                    <h2>
                                        Neue Info
                                    </h2>

                                    <label
                                        for="infoTitle"
                                        style="
                                            display:block;
                                            margin-bottom:8px;
                                            color:#38bdf8;
                                            font-weight:800;
                                        "
                                    >
                                        Titel
                                    </label>

                                    <input
                                        id="infoTitle"
                                        type="text"
                                        placeholder="z.B. Wartung am Freitag"
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    >

                                    <label
                                        for="infoText"
                                        style="
                                            display:block;
                                            margin-bottom:8px;
                                            color:#38bdf8;
                                            font-weight:800;
                                        "
                                    >
                                        Text
                                    </label>

                                    <textarea
                                        id="infoText"
                                        rows="7"
                                        placeholder="Schreibe hier die Information..."
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    ></textarea>

                                    <button
                                        class="primary-btn"
                                        onclick="saveInfo()"
                                        style="
                                            width:100%;
                                        "
                                    >
                                        Info speichern
                                    </button>

                                    <p
                                        id="saveFeedback"
                                        style="
                                            display:none;
                                            color:#86efac;
                                            margin-top:18px;
                                        "
                                    >
                                        Info gespeichert.
                                    </p>

                                </div>

                                <!-- INFOS -->

                                <div
                                    class="glass-card purple-theme"
                                    style="padding:35px;"
                                >

                                    <div
                                        style="
                                            display:flex;
                                            justify-content:space-between;
                                            align-items:center;
                                            gap:20px;
                                            margin-bottom:25px;
                                        "
                                    >

                                        <h2>
                                            Aktuelle Infos
                                        </h2>

                                        <button
                                            onclick="clearInfos()"
                                            style="
                                                background:#ef4444;
                                                color:white;
                                                border:none;
                                                padding:12px 18px;
                                                border-radius:12px;
                                                cursor:pointer;
                                                font-weight:700;
                                            "
                                        >
                                            Alle löschen
                                        </button>

                                    </div>

                                    <div id="infoList"></div>

                                </div>

                            </div>

                        </section>

                        <!-- WARTUNG -->

                        <section
                            id="sectionWartung"
                            style="display:none;"
                        >

                            <div
                                style="
                                    display:flex;
                                    flex-direction:column;
                                    gap:30px;
                                "
                            >

                                <!-- FORM -->

                                <div
                                    class="glass-card purple-theme-maintenance"
                                    style="
                                        width:100%;
                                        padding:50px;
                                        box-sizing:border-box;
                                    "
                                >

                                    <h2
                                        style="
                                            margin-bottom:35px;
                                        "
                                    >
                                        🛠️ Wartungsmodus
                                    </h2>

                                    <div
                                        style="
                                            display:flex;
                                            align-items:center;
                                            gap:20px;
                                            margin-bottom:25px;
                                        "
                                    >

                                        <select
                                            id="maintenancePage"
                                            onchange="loadMaintenanceSettings()"
                                            style="
                                                flex:1;
                                            "
                                        >

                                            <option value="global">
                                                Gesamte Website
                                            </option>

                                            <option value="Startseite">
                                                Startseite
                                            </option>

                                            <option value="Ecommerce">
                                                Ecommerce
                                            </option>

                                            <option value="Bueromanagement">
                                                Büromanagement
                                            </option>

                                        </select>

                                        <button
                                            onclick="openMaintenanceInfo()"
                                            style="
                                                width:52px;
                                                height:52px;
                                                border-radius:14px;
                                                border:none;
                                                background:rgba(56,189,248,0.15);
                                                color:white;
                                                font-size:22px;
                                                cursor:pointer;
                                            "
                                        >
                                            ℹ️
                                        </button>

                                    </div>

                                    <textarea
                                        id="maintenanceMessage"
                                        rows="5"
                                        placeholder="Infos (Wartung von 12-14 Uhr)"
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    ></textarea>

                                    <input
                                        id="maintenanceDuration"
                                        type="text"
                                        placeholder="Dauer (12:00 - 14:00 Uhr)"
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    >

                                    <input
                                        id="maintenanceType"
                                        type="text"
                                        placeholder="Grund (Systemupdate)"
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    >

                                    <input
                                        id="maintenanceDate"
                                        type="text"
                                        placeholder="Datum TT.MM.JJ"
                                        style="
                                            width:100%;
                                            box-sizing:border-box;
                                            margin-bottom:24px;
                                        "
                                    >

                                    <button
                                        class="primary-btn"
                                        onclick="saveMaintenanceSettings()"
                                        style="
                                            width:100%;
                                        "
                                    >
                                        Wartung speichern
                                    </button>

                                </div>

                                <!-- ACTIVE -->

                                <div
                                    class="glass-card"
                                    style="
                                        padding:40px;
                                    "
                                >

                                    <h3
                                        style="
                                            margin-bottom:25px;
                                        "
                                    >
                                        Aktive Wartungen
                                    </h3>

                                    <div
                                        id="allActiveMaintenances"
                                        style="
                                            display:flex;
                                            flex-direction:column;
                                            gap:24px;
                                        "
                                    ></div>

                                </div>

                            </div>

                        </section>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <div
        data-component="footer"
        data-variant="home"
        data-component-base="."
    ></div>

    <script type="module" src="components/components.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/game.js"></script>

</body>

</html>
