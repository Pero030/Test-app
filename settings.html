<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="width">
  <meta name="format-detection" content="telephone=no">
  <title>Einstellungen - ALO Academy</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div data-component="header" data-variant="home" data-component-base="."></div>

  <main style="min-height: calc(100vh - 250px); padding: 70px 30px;">

    <section
        class="section"
        style="
            max-width:1400px;
            margin:0 auto;
            display:block;
        "
    >

        <!-- HEADER -->

        <div
            style="
                text-align:center;
                margin-bottom:40px;
            "
        >

            <h1
                style="
                    font-size:52px;
                    font-weight:900;
                    background:linear-gradient(
                        135deg,
                        #38bdf8,
                        #a855f7
                    );
                    -webkit-background-clip:text;
                    -webkit-text-fill-color:transparent;
                "
            >
                Einstellungen
            </h1>

            <p
                style="
                    font-size:20px;
                    color:rgba(255,255,255,0.82);
                "
            >
                Infos erstellen, die über die Glocke angezeigt werden.
            </p>

        </div>

        <!-- LOCK -->

        <div
            id="settingsLocked"
            style="
                display:none;
                text-align:center;
                padding:40px;
            "
        >

            <h2>
                Zugriff geschützt
            </h2>

            <p>
                Bitte gib den PIN ein.
            </p>

            <input
                id="settingsPinInput"
                type="password"
                placeholder="PIN"
                style="
                    max-width:320px;
                    text-align:center;
                "
            >

            <div style="margin-top:24px;">

                <button
                    class="primary-btn"
                    onclick="unlockSettingsPage()"
                >
                    Entsperren
                </button>

                <button
                    class="secondary-btn"
                    onclick="location.href='./'"
                    style="margin-left:12px;"
                >
                    Zur Startseite
                </button>

            </div>

            <p
                id="settingsPinError"
                style="
                    display:none;
                    color:#fca5a5;
                    margin-top:20px;
                "
            >
                Falscher PIN.
            </p>

        </div>

        <!-- CONTENT -->

        <div id="settingsContent" style="display:none;">

            <div
                style="
                    display:grid;
                    grid-template-columns:260px 1fr;
                    gap:30px;
                    align-items:start;
                "
            >

                <!-- SIDEBAR -->

                <aside
                    style="
                        position:sticky;
                        top:130px;
                    "
                >

                    <div
                        class="glass-card"
                        style="
                            padding:25px;
                            display:flex;
                            flex-direction:column;
                            gap:18px;
                        "
                    >

                        <h2
                            style="
                                color:#38bdf8;
                                margin-bottom:10px;
                            "
                        >
                            Einstellungen
                        </h2>

                        <button
                            id="settingsTabMitteilungen"
                            onclick="showSettingsSection('mitteilungen')"
                            style="
                                background:rgba(56,189,248,0.16);
                                border:2px solid rgba(56,189,248,0.35);
                                color:white;
                                padding:16px 18px;
                                border-radius:14px;
                                font-size:16px;
                                font-weight:800;
                                text-align:left;
                                cursor:pointer;
                            "
                        >
                            📢 Mitteilungen
                        </button>

                        <button
                            id="settingsTabWartung"
                            onclick="showSettingsSection('wartung')"
                            style="
                                background:rgba(168,85,247,0.12);
                                border:2px solid rgba(168,85,247,0.28);
                                color:white;
                                padding:16px 18px;
                                border-radius:14px;
                                font-size:16px;
                                font-weight:800;
                                text-align:left;
                                cursor:pointer;
                            "
                        >
                            🛠️ Wartung
                        </button>

                    </div>

                </aside>

                <!-- RIGHT CONTENT -->

                <div>

                    <!-- MITTEILUNGEN -->

                    <div id="sectionMitteilungen">

                        <div
                            style="
                                display:grid;
                                grid-template-columns:
                                    repeat(
                                        auto-fit,
                                        minmax(420px,1fr)
                                    );
                                gap:30px;
                                align-items:start;
                            "
                        >

                            <!-- INFO ERSTELLEN -->

                            <div
                                class="glass-card blue-theme"
                                style="padding:35px;"
                            >

                                <h2>
                                    Neue Info
                                </h2>

                                <label
                                    for="infoTitle"
                                    style="
                                        display:block;
                                        color:#38bdf8;
                                        font-weight:800;
                                        margin-bottom:6px;
                                    "
                                >
                                    Titel
                                </label>

                                <input
                                    id="infoTitle"
                                    type="text"
                                    placeholder="z.B. Wartung am Freitag"
                                >

                                <label
                                    for="infoText"
                                    style="
                                        display:block;
                                        color:#38bdf8;
                                        font-weight:800;
                                        margin:22px 0 6px;
                                    "
                                >
                                    Text
                                </label>

                                <textarea
                                    id="infoText"
                                    rows="7"
                                    placeholder="Schreibe hier die Information..."
                                ></textarea>

                                <button
                                    class="primary-btn"
                                    onclick="saveInfo()"
                                    style="
                                        margin-top:24px;
                                        width:100%;
                                    "
                                >
                                    Info speichern
                                </button>

                                <p
                                    id="saveFeedback"
                                    style="
                                        display:none;
                                        color:#86efac;
                                        margin-top:18px;
                                    "
                                >
                                    Info gespeichert.
                                </p>

                            </div>

                            <!-- INFO LISTE -->

                            <div
                                class="glass-card purple-theme"
                                style="padding:35px;"
                            >

                                <div
                                    style="
                                        display:flex;
                                        align-items:center;
                                        justify-content:space-between;
                                        gap:20px;
                                        margin-bottom:18px;
                                    "
                                >

                                    <h2 style="margin:0;">
                                        Aktuelle Infos
                                    </h2>

                                    <button
                                        onclick="clearInfos()"
                                        style="
                                            background:#ef4444;
                                            color:white;
                                            padding:10px 16px;
                                            border-radius:12px;
                                            font-size:14px;
                                        "
                                    >
                                        Alle löschen
                                    </button>

                                </div>

                                <div id="infoList"></div>

                            </div>

                        </div>

                    </div>

                    <!-- WARTUNG -->

                    <div
                        id="sectionWartung"
                        style="display:none;"
                    >

                        <div
                            class="glass-card purple-theme"
                            style="padding:35px;"
                        >

                            <h2 style="margin-bottom:25px;">
                                🛠️ Wartungsmodus
                            </h2>

                            <select
                                id="maintenancePage"
                                onchange="loadMaintenanceSettings()"
                                style="
                                    width:100%;
                                    margin-bottom:20px;
                                "
                            >

                                <option value="global">
                                    Gesamte Website
                                </option>

                                <option value="Startseite">
                                    Startseite
                                </option>

                                <option value="Ecommerce">
                                    Ecommerce
                                </option>

                                <option value="Bueromanagement">
                                    Büromanagement
                                </option>

                            </select>

                            <p
                                style="
                                    margin-bottom:25px;
                                    font-weight:700;
                                    color:#38bdf8;
                                "
                            >
                                Wartungsmodus wird automatisch aktiviert.
                            </p>

                            <textarea
                                id="maintenanceMessage"
                                rows="5"
                                placeholder="z.B. Wartung von 12-14 Uhr"
                            ></textarea>

                            <input
                                id="maintenanceDuration"
                                type="text"
                                placeholder="12:00 - 14:00 Uhr"
                                style="margin-top:20px;"
                            >

                            <input
                                id="maintenanceType"
                                type="text"
                                placeholder="Systemupdate"
                                style="margin-top:20px;"
                            >

                            <input
                                id="maintenanceDate"
                                type="text"
                                placeholder="25.09.2025"
                                style="margin-top:20px;"
                            >

                            <button
                                class="primary-btn"
                                onclick="saveMaintenanceSettings()"
                                style="
                                    width:100%;
                                    margin-top:25px;
                                "
                            >
                                Wartung speichern
                            </button>

                            <div
                                id="activeMaintenanceBox"
                                style="
                                    margin-top:30px;
                                    padding:25px;
                                    border-radius:20px;
                                    background:rgba(255,255,255,0.06);
                                    border:1px solid rgba(255,255,255,0.12);
                                    display:none;
                                "
                            ></div>

                            <div
                                id="allActiveMaintenances"
                                style="
                                    margin-top:30px;
                                    display:flex;
                                    flex-direction:column;
                                    gap:20px;
                                "
                            ></div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

  <div data-component="footer" data-variant="home" data-component-base="."></div>

  <!-- Legal Modal für Footer-Links -->
  <div id="legalModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-content-scroll" style="padding: 50px;">
        <div id="legalContent" style="color: #ffffff; line-height: 1.8;"></div>
        <div style="text-align: center; margin-top: 40px;">
          <button class="modal-btn" onclick="closeLegalModal()">Schließen</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">

    // sessionStorage-Flag nur bei Browser-Navigation (Zurück/Vor) löschen
    if (window.performance && window.performance.getEntriesByType) {
      const navEntries = window.performance.getEntriesByType("navigation");
      if (navEntries.length > 0 && navEntries[0].type === "back_forward") {
        sessionStorage.removeItem("aloAcademySettingsUnlocked");
      }
    }

    if (
        sessionStorage.getItem(
            "aloAcademySettingsUnlocked"
        ) !== "true"
    ) {

        window.location.replace(
            "./"
        );
    }

    import {
      db,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      getDoc,
      query,
      setDoc
    } from "./assets/js/firebase.js";

    async function getInfos() {

      const q = query(collection(db, "infos"));

      const snapshot = await getDocs(q);

      const infos = [];

      snapshot.forEach((docItem) => {
        infos.push({
          firebaseId: docItem.id,
          ...docItem.data()
        });
      });

      return infos.reverse();
    }

    async function getSettingsPin() {

      const settingsRef = doc(db, "settings", "security");

      const snapshot = await getDoc(settingsRef);

      if (!snapshot.exists()) {
        return null;
      }

      return snapshot.data().settingsPin;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function renderInfos() {
      const list = document.getElementById("infoList");
      const infos = await getInfos();

      if (!infos.length) {
        list.innerHTML = '<p style="color: rgba(255,255,255,0.72);">Noch keine Infos vorhanden.</p>';
        return;
      }

      list.innerHTML = infos.map(function (info, index) {
        return '<div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; padding: 20px; margin-bottom: 14px;">' +
          '<h3 style="font-size: 22px; margin-bottom: 8px;">' + escapeHtml(info.title) + '</h3>' +
          '<p style="font-size: 16px; color: rgba(255,255,255,0.82); white-space: pre-wrap;">' + escapeHtml(info.text) + '</p>' +
          '<p style="font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 14px;">' + escapeHtml(info.date || "") + '</p>' +
          '<button onclick="deleteInfo(\'' + info.firebaseId + '\')" style="background: #ef4444; color: white; padding: 9px 14px; border-radius: 10px; font-size: 13px;">Löschen</button>' +
        '</div>';
      }).join("");
    }

    async function saveInfo() {

      const title = document.getElementById("infoTitle").value.trim();
      const text = document.getElementById("infoText").value.trim();
      const feedback = document.getElementById("saveFeedback");

      if (!title || !text) {
        alert("Bitte Titel und Text ausfüllen.");
        return;
      }

      await addDoc(collection(db, "infos"), {
        title: title,
        text: text,
        date: new Date().toLocaleDateString("de-DE", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric"
        }),
        createdAt: Date.now()
      });

      document.getElementById("infoTitle").value = "";
      document.getElementById("infoText").value = "";

      feedback.style.display = "block";

      setTimeout(function () {
        feedback.style.display = "none";
      }, 1800);

      await renderInfos();

      if (typeof updateInfoBadge === "function") {
        updateInfoBadge();
      }
    }

    async function deleteInfo(firebaseId) {

      await deleteDoc(doc(db, "infos", firebaseId));

      await renderInfos();

      if (typeof updateInfoBadge === "function") {
        updateInfoBadge();
      }
    }

    async function clearInfos() {

      if (!confirm("Alle Infos löschen?")) return;

      const infos = await getInfos();

      for (const info of infos) {
        await deleteDoc(doc(db, "infos", info.firebaseId));
      }

      await renderInfos();

      if (typeof updateInfoBadge === "function") {
        updateInfoBadge();
      }
    }

    async function unlockSettingsPage() {

      const settingsPin = await getSettingsPin();

      console.log(settingsPin);

      const input = document.getElementById("settingsPinInput");
      const error = document.getElementById("settingsPinError");

      if (input.value === settingsPin) {
        sessionStorage.setItem("aloAcademySettingsUnlocked", "true");
        showSettingsContent();
      } else {
        error.style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    function showSettingsContent() {

      document.getElementById(
        "settingsLocked"
      ).style.display = "none";

      document.getElementById(
        "settingsContent"
      ).style.display = "block";

      renderInfos();

      loadMaintenanceSettings();

      showSettingsSection(
          "mitteilungen"
      );
    }

    document.addEventListener("DOMContentLoaded", function () {
      if (sessionStorage.getItem("aloAcademySettingsUnlocked") === "true") {
        showSettingsContent();
      } else {
        document.getElementById("settingsLocked").style.display = "block";
      }

      const input = document.getElementById("settingsPinInput");
      if (input) {
        input.addEventListener("keydown", function (event) {
          if (event.key === "Enter") unlockSettingsPage();
        });
      }
    });

    async function loadMaintenanceSettings() {

      const page =
        document.getElementById(
          "maintenancePage"
        ).value;

      const snapshot =
        await getDoc(

          doc(
            db,
            "maintenance",
            page
          )
        );

      if (!snapshot.exists()) {
        return;
      }

      const data =
        snapshot.data();

      // Checkbox wurde entfernt, Wartungsmodus wird automatisch aktiviert

      document.getElementById(
        "maintenanceMessage"
      ).value =
        data.message || "";

      document.getElementById(
        "maintenanceDate"
      ).value =
        data.date || "";

      document.getElementById(
          "maintenanceDuration"
      ).value =
          data.duration || "";

      document.getElementById(
          "maintenanceType"
      ).value =
          data.type || "";

          const box =
              document.getElementById(
                  "activeMaintenanceBox"
              );

          if (data.enabled) {

              box.style.display = "block";

              box.innerHTML = `
                  <h3 style="
                      margin-bottom:18px;
                      color:#38bdf8;
                  ">
                      Aktive Wartung
                  </h3>

                  <p>
                      <strong>Seite:</strong>
                      ${page}
                  </p>

                  <p>
                      <strong>Art:</strong>
                      ${data.type || "-"}
                  </p>

                  <p>
                      <strong>Dauer:</strong>
                      ${data.duration || "-"}
                  </p>

                  <p>
                      <strong>Nachricht:</strong>
                      ${data.message || "-"}
                  </p>

                  <p>
                      <strong>Datum:</strong>
                      ${data.date || "-"}
                  </p>

                  <button
                      onclick="disableMaintenance()"
                      style="
                          margin-top:20px;
                          background:#ef4444;
                          color:white;
                          padding:12px 18px;
                          border:none;
                          border-radius:14px;
                          font-weight:800;
                          cursor:pointer;
                      "
                  >
                      Wartung beenden
                  </button>
                `;

          } else {

              box.style.display = "none";
          }
        
    }

    async function saveMaintenanceSettings() {

      const page =
        document.getElementById(
          "maintenancePage"
        ).value;

      const enabled = true; // Wartungsmodus wird immer aktiviert

      const message =
        document.getElementById(
          "maintenanceMessage"
        ).value;

      const date =
        document.getElementById(
          "maintenanceDate"
        ).value;

      const duration =
        document.getElementById(
            "maintenanceDuration"
        ).value;

      const type =
        document.getElementById(
            "maintenanceType"
        ).value;

      try {

        await setDoc(

          doc(
            db,
            "maintenance",
            page
          ),

          {
            enabled,
            message,
            date,
            duration,
            type
          }

        );

        alert(
            "Wartung gespeichert"
        );

        // UI aktualisieren
        const box = document.getElementById("activeMaintenanceBox");
        if (enabled) {
          box.style.display = "block";
          box.innerHTML = `
            <h3 style="margin-bottom:18px; color:#38bdf8;">Aktive Wartung</h3>
            <p><strong>Seite:</strong> ${page}</p>
            <p><strong>Art:</strong> ${type || "-"}</p>
            <p><strong>Dauer:</strong> ${duration || "-"}</p>
            <p><strong>Nachricht:</strong> ${message || "-"}</p>
            <p><strong>Datum:</strong> ${date || "-"}</p>
            <button onclick="disableMaintenance()" style="margin-top:20px; background:#ef4444; color:white; padding:12px 18px; border:none; border-radius:14px; font-weight:800; cursor:pointer;">Wartung beenden</button>
          `;
        } else {
          box.style.display = "none";
        }

      } catch (error) {

        console.error(error);

        alert(
          "Fehler beim Speichern"
        );
      }
    }

    async function disableMaintenance() {

      const page =
          document.getElementById(
              "maintenancePage"
          ).value;

      await setDoc(

          doc(
              db,
              "maintenance",
              page
          ),

          {
              enabled:false,
              message:"",
              date:"",
              duration:"",
              type:""
          }

      );

      loadMaintenanceSettings();

      alert(
          "Wartung beendet"
      );
    }

    function showSettingsSection(section) {

      const mitteilungen =
          document.getElementById(
              "sectionMitteilungen"
          );

      const wartung =
          document.getElementById(
              "sectionWartung"
          );

      const mitteilungenBtn =
          document.getElementById(
              "settingsTabMitteilungen"
          );

      const wartungBtn =
          document.getElementById(
              "settingsTabWartung"
          );

      mitteilungen.style.display =
          "none";

      wartung.style.display =
          "none";

      mitteilungenBtn.style.background =
          "rgba(56,189,248,0.16)";

      wartungBtn.style.background =
          "rgba(168,85,247,0.12)";

      if (section === "mitteilungen") {

          mitteilungen.style.display =
              "block";

          mitteilungenBtn.style.background =
              "rgba(56,189,248,0.3)";
      }

      if (section === "wartung") {

          wartung.style.display =
              "block";

          wartungBtn.style.background =
              "rgba(168,85,247,0.3)";
      }
    }

    window.saveInfo = saveInfo;
    window.deleteInfo = deleteInfo;
    window.clearInfos = clearInfos;
    window.unlockSettingsPage = unlockSettingsPage;
    window.saveMaintenanceSettings = saveMaintenanceSettings;
    window.loadMaintenanceSettings = loadMaintenanceSettings;
    window.disableMaintenance = disableMaintenance;

  </script>

  <script type="module" src="components/components.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/game.js"></script>


  
  
</body>
</html>
