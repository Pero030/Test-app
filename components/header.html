<template data-component-template="header" data-variant="home">
  <!-- HEADER (Gleich wie im Spiel) -->
  <header class="topbar">
    <div class="logo-area" onclick="location.href='./'" style="cursor: pointer;">
      <img src="assets/images/Logo/Logo.png" alt="Logo" class="main-logo">
    </div>
    <div class="topbar-right">
      <button onclick="openInfoBell()" aria-label="Infos anzeigen" title="Infos" style="position: relative; background: rgba(56, 189, 248, 0.15); color: white; width: 46px; height: 46px; padding: 0; border-radius: 12px; font-size: 22px; border: 1px solid rgba(56,189,248,0.4); cursor: pointer; font-weight: bold;">🔔<span data-info-count style="display: none; position: absolute; top: -7px; right: -7px; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: #ef4444; color: white; font-size: 11px; line-height: 20px; font-weight: 900;"></span></button>
      <button onclick="openSettingsPin('.')" aria-label="Einstellungen" title="Einstellungen" style="background: rgba(168, 85, 247, 0.18); color: white; width: 46px; height: 46px; padding: 0; border-radius: 12px; font-size: 22px; border: 1px solid rgba(168,85,247,0.45); cursor: pointer; font-weight: bold;">⚙️</button>
    </div>
  </header>
</template>

<template data-component-template="header" data-variant="settings">
  <!-- HEADER (Settings-Seite mit Zur Startseite Button) -->
  <header class="topbar">
    <div class="logo-area" onclick="location.href='./'" style="cursor: pointer;">
      <img src="assets/images/Logo/Logo.png" alt="Logo" class="main-logo">
    </div>
    <div class="topbar-right">
      <button onclick="openInfoBell()" aria-label="Infos anzeigen" title="Infos" style="position: relative; background: rgba(56, 189, 248, 0.15); color: white; width: 46px; height: 46px; padding: 0; border-radius: 12px; font-size: 22px; border: 1px solid rgba(56,189,248,0.4); cursor: pointer; font-weight: bold;">🔔<span data-info-count style="display: none; position: absolute; top: -7px; right: -7px; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: #ef4444; color: white; font-size: 11px; line-height: 20px; font-weight: 900;"></span></button>
      <button
          onclick="location.href='./'"
          aria-label="Zur Startseite"
          style="
              background: #38bdf8;
              color: white;
              padding: 10px 20px;
              border-radius: 12px;
              font-size: 14px;
              border: none;
              cursor: pointer;
              font-weight: bold;
          "
      >
          🏠 Zur Startseite
      </button>
    </div>
  </header>
</template>

<template data-component-template="header" data-variant="ecommerce">
        <header class="topbar">
            <a
                href="../"
                class="logo-area"
                aria-label="Zur Startseite"
                role="link"
            >
                <img
                    src="../assets/images/Logo/Logo.png"
                    alt="E-Commerce Academy Logo"
                    class="main-logo"
                />
            </a>
            <div class="topbar-right">
                <button onclick="openInfoBell()" aria-label="Infos anzeigen" title="Infos" style="position: relative; background: rgba(56, 189, 248, 0.15); color: white; width: 46px; height: 46px; padding: 0; border-radius: 12px; font-size: 22px; border: 1px solid rgba(56,189,248,0.4); cursor: pointer; font-weight: bold;">🔔<span data-info-count style="display: none; position: absolute; top: -7px; right: -7px; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: #ef4444; color: white; font-size: 11px; line-height: 20px; font-weight: 900;"></span></button>
                <button onclick="openSettingsPin('..')" aria-label="Einstellungen" title="Einstellungen" style="background: rgba(168, 85, 247, 0.18); color: white; width: 46px; height: 46px; padding: 0; border-radius: 12px; font-size: 22px; border: 1px solid rgba(168,85,247,0.45); cursor: pointer; font-weight: bold;">⚙️</button>
                <button
                    onclick="confirmRestart('home')"
                    aria-label="Zur Startseite"
                    style="
                        background: #38bdf8;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 12px;
                        font-size: 14px;
                        border: none;
                        cursor: pointer;
                        font-weight: bold;
                    "
                >
                    🏠 Zur Startseite
                </button>
                <button
                    onclick="checkBuilderPin()"
                    aria-label="Builder Test starten"
                    style="
                        background: #a855f7;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 12px;
                        font-size: 14px;
                        margin-left: 10px;
                        cursor: pointer;
                        border: none;
                        font-weight: bold;
                    "
                >
                    🛠️ Builder Test
                </button>
            </div>
        </header>
</template>
