<template data-component-template="header" data-variant="home">
  <!-- HEADER (Gleich wie im Spiel) -->
  <header class="topbar">
    <div class="logo-area" onclick="location.href='./'" style="cursor: pointer;">
      <img src="assets/images/Logo/Logo.png" alt="Logo" class="main-logo">
    </div>
  </header>
</template>

<template data-component-template="header" data-variant="ecommerce">
        <header class="topbar">
            <a
                href="../"
                class="logo-area"
                aria-label="Zur Startseite"
                role="link"
            >
                <img
                    src="../assets/images/Logo/Logo.png"
                    alt="E-Commerce Academy Logo"
                    class="main-logo"
                />
            </a>
            <div class="topbar-right">
                <button
                    onclick="confirmRestart('home')"
                    aria-label="Zur Startseite"
                    style="
                        background: #38bdf8;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 12px;
                        font-size: 14px;
                        border: none;
                        cursor: pointer;
                        font-weight: bold;
                    "
                >
                    🏠 Zur Startseite
                </button>
                <button
                    onclick="checkBuilderPin()"
                    aria-label="Builder Test starten"
                    style="
                        background: #a855f7;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 12px;
                        font-size: 14px;
                        margin-left: 10px;
                        cursor: pointer;
                        border: none;
                        font-weight: bold;
                    "
                >
                    🛠️ Builder Test
                </button>
            </div>
        </header>
</template>

                        background: #38bdf8;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 12px;
                        font-size: 14px;
                        border: none;
                        cursor: pointer;
                        font-weight: bold;
                    "
                >
                    🏠 Zur Startseite
                </button>
            </div>
        </header>
</template>
