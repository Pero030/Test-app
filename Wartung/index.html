<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Wartung - ALO Academy
    </title>

    <link
        rel="stylesheet"
        href="../assets/css/style.css"
    >

</head>

<body data-page="Wartung">

    <div data-component="header" data-variant="Wartung" data-component-base=".."></div>

    <main
        style="
            min-height:calc(100vh - 250px);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px;
        "
    >

        <div
            style="
                max-width:700px;
                width:100%;
                background:rgba(15,23,42,0.9);
                border:2px solid #a855f7;
                border-radius:30px;
                padding:50px;
                text-align:center;
                color:white;
                box-shadow:0 25px 50px rgba(0,0,0,0.5);
            "
        >

            <h1
                style="
                    font-size:52px;
                    margin-bottom:20px;
                    background:linear-gradient(
                        135deg,
                        #38bdf8,
                        #a855f7
                    );
                    -webkit-background-clip:text;
                    -webkit-text-fill-color:transparent;
                "
            >
                Wartung
            </h1>

            <h2
                id="maintenanceType"
                style="
                    font-size:32px;
                    margin-bottom:20px;
                    color:#38bdf8;
                "
            ></h2>

            <p
                id="maintenanceMessage"
                style="
                    font-size:22px;
                    line-height:1.8;
                    opacity:0.9;
                "
            ></p>

            <p
                id="maintenanceDuration"
                style="
                    margin-top:20px;
                    font-size:20px;
                    color:#a855f7;
                    font-weight:700;
                "
            ></p>

            <p
                id="maintenanceDate"
                style="
                    margin-top:25px;
                    opacity:0.7;
                    font-size:18px;
                "
            ></p>

        </div>

    </main>

    <div data-component="footer" data-variant="academy" data-component-base=".."></div>

    <script type="module">

        const data =
            JSON.parse(

                sessionStorage.getItem(
                    "maintenanceData"
                ) || "{}"
            );

        document.getElementById(
            "maintenanceType"
        ).textContent =
            data.type || "Wartung";

        document.getElementById(
            "maintenanceMessage"
        ).textContent =
            data.message || "";

        document.getElementById(
            "maintenanceDuration"
        ).textContent =
            "⏳ " +
            (data.duration || "");

        document.getElementById(
            "maintenanceDate"
        ).textContent =
            data.date || "";

    </script>

    <script
        type="module"
        src="../components/components.js"
    ></script>

</body>

</html>
